# nginx/nginx.conf
#
# NGINX reverse proxy configuration for the AI Gateway.
#
# Responsibilities:
#   - Terminate TLS (when certs are mounted via Docker secrets or volumes).
#   - Rate-limit inbound connections at the network level (before they reach
#     the FastAPI app) as a first line of defence against DDoS.
#   - Proxy all /v1/* requests to the upstream FastAPI gateway service.
#   - Set security headers on all responses (HSTS, CSP, X-Frame-Options, etc.).
#   - Serve a static /health endpoint directly from NGINX for container
#     orchestrators (Kubernetes liveness probe, Docker healthcheck) without
#     waking the Python process.
#   - Handle large request bodies for long-context model inputs (up to 10 MB).
#   - Log in JSON format for structured ingestion by log aggregators.
#
# Services in the Docker Compose network:
#   gateway  — FastAPI app on port 8000
#   nginx    — this process, listening on 80 (and 443 when TLS is configured)

# ---------------------------------------------------------------------------
# Worker settings
# ---------------------------------------------------------------------------

# worker_processes auto: let NGINX spawn one worker per CPU core.
# In a Docker container this typically resolves to the container's CPU quota.
worker_processes auto;

events {
    # Maximum simultaneous connections per worker process.
    # Total capacity = worker_processes * worker_connections.
    worker_connections 1024;

    # epoll is the most efficient I/O multiplexer on Linux (containers).
    use epoll;

    # Accept multiple connections per epoll event (throughput optimisation).
    multi_accept on;
}

# ---------------------------------------------------------------------------
# HTTP block
# ---------------------------------------------------------------------------

http {
    # -----------------------------------------------------------------------
    # Basic MIME / encoding settings
    # -----------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Efficient file transfer (skips user-space copy for static files).
    sendfile on;

    # Optimise TCP packet batching — reduces small-packet overhead for proxied
    # streams (useful when streaming LLM token responses in the future).
    tcp_nopush  on;
    tcp_nodelay on;

    # -----------------------------------------------------------------------
    # Upstream — the FastAPI gateway service
    # -----------------------------------------------------------------------
    # "gateway" resolves to the Docker Compose service name.
    # keepalive 32 means NGINX keeps 32 idle connections to the upstream
    # warm — avoids TCP handshake overhead on every proxied request.
    upstream gateway {
        server gateway:8000;
        keepalive 32;
    }

    # -----------------------------------------------------------------------
    # Network-level rate limiting (before the Python app sees the request)
    #
    # limit_req_zone defines a shared memory zone that tracks request counts
    # per $binary_remote_addr (the client IP address, stored compactly).
    #   zone=gateway_limit:10m  — 10 MB shared memory (~160k IP addresses)
    #   rate=30r/s              — max 30 requests per second per IP
    #
    # This is separate from, and complementary to, the Redis sliding-window
    # rate limiter in the Python layer (which operates per API key).
    # -----------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=gateway_limit:10m rate=30r/s;

    # -----------------------------------------------------------------------
    # JSON access log format
    #
    # Structured logs are easier to ingest into log aggregators (Loki, Splunk,
    # CloudWatch Logs).  Each line is a valid JSON object.
    # -----------------------------------------------------------------------
    log_format json_log escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"request_time":$request_time,'
            '"bytes_sent":$bytes_sent,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent",'
            '"x_request_id":"$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log json_log;
    error_log  /var/log/nginx/error.log  warn;

    # -----------------------------------------------------------------------
    # Timeouts
    # -----------------------------------------------------------------------
    # How long to keep a client connection open between requests.
    keepalive_timeout 65;

    # How long to wait for the FastAPI upstream to send a response.
    # LLM inference can take 30-90+ seconds for long outputs — set generously.
    proxy_read_timeout    120s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     30s;

    # -----------------------------------------------------------------------
    # Request body size
    # -----------------------------------------------------------------------
    # Allow up to 10 MB request bodies for long-context model inputs
    # (e.g. a book-length context window in GPT-4o or Claude).
    client_max_body_size 10m;

    # Increase the buffer for large request headers (long system prompts can
    # produce large Content-Length headers).
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;

    # -----------------------------------------------------------------------
    # Gzip compression
    # -----------------------------------------------------------------------
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # -----------------------------------------------------------------------
    # Main server block — HTTP on port 80
    # -----------------------------------------------------------------------
    server {
        listen 80;
        server_name _;   # match any hostname (set to your domain in production)

        # -------------------------------------------------------------------
        # Security headers
        # Sent on ALL responses from this server block.
        # -------------------------------------------------------------------

        # Prevent MIME-type sniffing (e.g. browser treating JSON as HTML).
        add_header X-Content-Type-Options "nosniff" always;

        # Disallow embedding in iframes (clickjacking protection).
        add_header X-Frame-Options "DENY" always;

        # Enable XSS filter in legacy browsers.
        add_header X-XSS-Protection "1; mode=block" always;

        # HSTS: instruct browsers to only use HTTPS for the next year.
        # Comment this out on plain HTTP deployments (dev/staging).
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Content Security Policy — restrict which resources the page can load.
        add_header Content-Security-Policy "default-src 'none'" always;

        # Referrer policy — don't leak request URLs to external parties.
        add_header Referrer-Policy "no-referrer" always;

        # Hide NGINX version from error responses.
        server_tokens off;

        # -------------------------------------------------------------------
        # Health check endpoint — served directly by NGINX.
        # Returns immediately without proxying to the Python app, so container
        # orchestrators get a fast liveness signal even during startup.
        # -------------------------------------------------------------------
        location = /health {
            access_log off;                    # don't pollute logs with healthchecks
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # -------------------------------------------------------------------
        # API traffic — proxy to the FastAPI gateway
        # -------------------------------------------------------------------
        location /v1/ {
            # Network-level rate limit: burst of 20 requests, no delay
            # (beyond the burst, excess requests get 503 immediately).
            limit_req zone=gateway_limit burst=20 nodelay;

            # Proxy to the upstream FastAPI service.
            proxy_pass         http://gateway;
            proxy_http_version 1.1;

            # Forward the original client IP and host so the gateway can
            # use them for rate-limit keys and request logging.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keep the upstream connection alive (matches keepalive 32 in upstream block).
            proxy_set_header Connection "";

            # Pass through the X-Request-ID if the client set one,
            # otherwise NGINX generates one (requires headers_more module or
            # can be done in the FastAPI middleware instead).
            proxy_set_header X-Request-ID $http_x_request_id;
        }

        # -------------------------------------------------------------------
        # Metrics endpoint — only accessible from within the Docker network
        # -------------------------------------------------------------------
        location = /metrics {
            # Restrict to the internal Docker subnet.
            # In production, use a VPN or authenticated proxy instead.
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://gateway;
        }

        # -------------------------------------------------------------------
        # Catch-all — return 404 for any unrecognised paths
        # -------------------------------------------------------------------
        location / {
            return 404 '{"error":"not found"}\n';
            add_header Content-Type application/json;
        }
    }

    # -----------------------------------------------------------------------
    # HTTPS server block — uncomment and configure for production TLS
    # -----------------------------------------------------------------------
    # Certificates can be mounted as Docker volumes from Let's Encrypt
    # (Certbot) or a corporate CA.
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #
    #     # Modern TLS configuration (Mozilla SSL Config Generator — "Intermediate")
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_timeout 1d;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_tickets off;
    #
    #     # Enable HSTS (tells browsers to use HTTPS for the next 2 years).
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     # ... same location blocks as the HTTP server above ...
    # }
}
