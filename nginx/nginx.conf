# nginx/nginx.conf
#
# NGINX reverse proxy configuration for the AI Gateway.
#
# Responsibilities:
#   - Terminate TLS (when certs are mounted via Docker secrets or volumes).
#   - Rate-limit inbound connections at the network level (before they reach
#     the FastAPI app) as a first line of defence against DDoS.
#   - Proxy all /v1/* requests to the upstream FastAPI gateway service.
#   - Set security headers on all responses (HSTS, CSP, X-Frame-Options, etc.).
#   - Serve a static /health endpoint directly from NGINX for container
#     orchestrators (Kubernetes liveness probe, Docker healthcheck) without
#     waking the Python process.
#   - Handle large request bodies for long-context model inputs (up to 10 MB).
#   - Log in JSON format for structured ingestion by log aggregators.
#
# Services in the Docker Compose network:
#   gateway  — FastAPI app on port 8000
#   nginx    — this process, listening on 80 (and 443 when TLS is configured)

