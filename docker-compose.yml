version: "3.9"

# =============================================================================
# AI Gateway — Docker Compose service definitions
#
# Services:
#   nginx    — Edge reverse proxy; terminates HTTP, rate-limits, forwards to gateway
#   gateway  — FastAPI app (uvicorn); the core AI Gateway
#   redis    — Distributed rate limiter state + cache TTL store
#   langfuse — Self-hosted LLM observability platform (server + worker + DB)
#
# Usage:
#   docker compose up          # start all services
#   docker compose up gateway  # start gateway + its dependencies only
#   docker compose down -v     # stop and remove volumes
#
# Environment:
#   Copy .env.example to .env and fill in your values before running.
#   All secrets are read from the .env file at compose runtime.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # NGINX — edge reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      # - "443:443"   # uncomment when TLS certs are mounted
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./certs:/etc/nginx/certs:ro   # mount TLS certificates here
    depends_on:
      - gateway
    restart: unless-stopped
    # TODO: add healthcheck (curl -f http://localhost/health)

  # ---------------------------------------------------------------------------
  # Gateway — FastAPI application
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    # Port NOT exposed to host — NGINX is the only entry point.
    # Expose directly for local development without NGINX:
    # ports:
    #   - "8000:8000"
    env_file:
      - .env
    environment:
      # Override specific env vars for Docker networking (service DNS names):
      - REDIS__HOST=redis
      - LANGFUSE__HOST=http://langfuse:3000
      - PROVIDERS__OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./models:/app/models             # ML model checkpoints
      - ./cache:/app/cache               # FAISS index persistence
      - ./contracts:/app/contracts       # behavioral contract definitions
      - ./gateway/security:/app/gateway/security  # patterns.json hot-reload
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # TODO: add healthcheck (curl -f http://localhost:8000/health)

  # ---------------------------------------------------------------------------
  # Redis — rate limiter state + cache TTL store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    command: >
      redis-server
      --requirepass ${REDIS__PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    # Port NOT exposed to host by default — gateway accesses via internal network.
    # Uncomment for local inspection with redis-cli:
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Langfuse — self-hosted LLM observability
  # ---------------------------------------------------------------------------
  # TODO: Replace the stub below with the official Langfuse docker-compose
  #       snippet from https://langfuse.com/docs/deployment/self-host
  #       (requires: langfuse server, langfuse worker, postgres database)
  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${LANGFUSE_DATABASE_URL:-postgresql://langfuse:langfuse@langfuse-db:5432/langfuse}
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-change-me-in-production}
      - SALT=${LANGFUSE_SALT:-change-me-in-production}
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false
    depends_on:
      - langfuse-db
    restart: unless-stopped

  langfuse-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Ollama — optional local model serving
  # ---------------------------------------------------------------------------
  # Uncomment this service to run local models via Ollama.
  # After starting, pull a model with: docker exec -it ollama ollama pull llama3
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped
  #   # For GPU support (NVIDIA), add:
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - capabilities: [gpu]

# =============================================================================
# Named volumes — persist data across container restarts
# =============================================================================
volumes:
  redis_data:
  langfuse_db_data:
  # ollama_data:

# =============================================================================
# Network — all services share a single bridge network
# =============================================================================
networks:
  default:
    name: gateway_network
